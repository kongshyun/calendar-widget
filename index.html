<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 캘린더</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    color: #111;
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .widget {
    width: 100%;
    max-width: 400px;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .left {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .week-badge {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.03em;
    padding: 3px 10px;
    border-radius: 20px;
    transition: all 0.2s;
  }

  .badge-this  { background: #f0f7e0; color: #4a7a00; }
  .badge-next  { background: #e0f0f7; color: #006a90; }
  .badge-prev  { background: #f0f0f0; color: #555; }
  .badge-other { background: #f0f0f0; color: #555; }

  .month-label {
    font-size: 13px;
    color: #333;
    font-weight: 600;
  }

  .right {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: #555;
    font-weight: 500;
  }

  .nav-btn {
    background: none;
    border: 1px solid #ddd;
    color: #333;
    width: 26px;
    height: 26px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-weight: 700;
  }

  .nav-btn:hover { border-color: #999; color: #111; }

  .days-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .day-col {
    display: flex;
    flex-direction: column;
  }

  .day-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 12px 4px;
    border-radius: 10px;
    border: 1px solid #ebebeb;
    background: #fafafa;
    transition: all 0.15s;
  }

  .day-card:hover { border-color: #ccc; background: #f3f3f3; }

  .day-card.today {
    background: #f4fce6;
    border-color: #a8d840;
  }

  .day-card.past {
    opacity: 0.45;
  }

  .day-name {
    font-size: 13px;
    font-weight: 700;
    color: #222;
    letter-spacing: 0.03em;
    margin-bottom: 8px;
  }

  .day-card.today .day-name { color: #4a7a00; }

  .day-num {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: #111;
    line-height: 1;
  }

  .day-card.today .day-num { color: #4a7a00; }

  .today-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #a8d840;
    margin-top: 7px;
  }

  .footer {
    margin-top: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .week-range {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: #666;
    font-weight: 500;
  }

  .today-btn {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px;
    font-weight: 600;
    background: none;
    border: 1px solid #ddd;
    color: #555;
    padding: 4px 12px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .today-btn:hover { border-color: #a8d840; color: #4a7a00; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .days-grid { animation: fadeUp 0.25s ease; }
</style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="left">
      <span class="week-badge" id="weekBadge"></span>
      <span class="month-label" id="monthLabel"></span>
    </div>
    <div class="right">
      <span class="clock" id="clock"></span>
      <button class="nav-btn" onclick="changeWeek(-1)">‹</button>
      <button class="nav-btn" onclick="changeWeek(1)">›</button>
    </div>
  </div>

  <div class="days-grid" id="daysGrid"></div>

  <div class="footer">
    <span class="week-range" id="weekRange"></span>
    <button class="today-btn" onclick="goToday()">오늘로</button>
  </div>
</div>

<script>
  const DAY_NAMES = ['월', '화', '수', '목', '금'];
  let offset = 0;

  function getMonday(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = day === 0 ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0, 0, 0, 0);
    return d;
  }

  function fmt(date) {
    return `${date.getMonth() + 1}/${date.getDate()}`;
  }

  function render() {
    const today = new Date(); today.setHours(0,0,0,0);
    const monday = getMonday(today);
    monday.setDate(monday.getDate() + offset * 7);
    const friday = new Date(monday); friday.setDate(friday.getDate() + 4);

    const badge = document.getElementById('weekBadge');
    if (offset === 0)       { badge.textContent = '이번주'; badge.className = 'week-badge badge-this'; }
    else if (offset === 1)  { badge.textContent = '다음주'; badge.className = 'week-badge badge-next'; }
    else if (offset === -1) { badge.textContent = '저번주'; badge.className = 'week-badge badge-prev'; }
    else                    { badge.textContent = `${offset > 0 ? '+':''}${offset}주`; badge.className = 'week-badge badge-other'; }

    const ms = monday.getMonth()+1, me = friday.getMonth()+1, yr = monday.getFullYear();
    document.getElementById('monthLabel').textContent = ms === me ? `${yr}년 ${ms}월` : `${yr}년 ${ms}–${me}월`;
    document.getElementById('weekRange').textContent = `${fmt(monday)} – ${fmt(friday)}`;

    const grid = document.getElementById('daysGrid');
    grid.innerHTML = '';
    grid.style.animation = 'none';
    requestAnimationFrame(() => grid.style.animation = '');

    for (let i = 0; i < 5; i++) {
      const d = new Date(monday); d.setDate(d.getDate() + i);
      const isToday = d.getTime() === today.getTime();
      const isPast  = d < today;

      const col = document.createElement('div');
      col.className = 'day-col';
      col.innerHTML = `
        <div class="day-card${isToday ? ' today' : ''}${isPast ? ' past' : ''}">
          <div class="day-name">${DAY_NAMES[i]}</div>
          <div class="day-num">${d.getDate()}</div>
          ${isToday ? '<div class="today-dot"></div>' : ''}
        </div>`;
      grid.appendChild(col);
    }
  }

  function changeWeek(dir) { offset += dir; render(); }
  function goToday() { offset = 0; render(); }

  function updateClock() {
    const n = new Date();
    document.getElementById('clock').textContent =
      `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
  }

  render();
  updateClock();
  setInterval(updateClock, 60000);
</script>
</body>
</html>
